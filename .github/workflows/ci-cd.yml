name: CI/CD

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch: # 수동 실행 기능

jobs:
  build-docker-image:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar

      - name: create deploy directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/deploy

      - name: copy docker-compose.yml
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/deploy/"

      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PWD }}

      - name: Docker build and push
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_REPO: ${{ secrets.DOCKER_REPO }}
        run: docker build --no-cache -t ${DOCKER_USERNAME}/${DOCKER_REPO}:latest .

      - name: docker Hub push
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_REPO: ${{ secrets.DOCKER_REPO }}
        run: docker push ${DOCKER_USERNAME}/${DOCKER_REPO}:latest


  deploy:
    needs: build-docker-image
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cat <<EOF > ~/deploy/.env
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            DOCKER_REPO=${{ secrets.DOCKER_REPO }}
            SPRING_PROFILES_ACTIVE=prod
            SERVER_PORT=8080
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PWD }}
            DB_DRIVER=com.mysql.cj.jdbc.Driver
            JPA_DDL_AUTO=update
            JPA_SHOW_SQL=false
            NETZERO3_STORAGE_S3_BUCKET=${{ secrets.S3_BUCKET }}
            NETZERO3_STORAGE_S3_REGION=${{ secrets.S3_REGION }}
            EOF

            cd ~/deploy
            sudo docker compose -f docker-compose.yml down
            sudo docker compose -f docker-compose.yml pull --ignore-pull-failures
            sudo docker compose -f docker-compose.yml --env-file .env up -d --force-recreate
