services:
  app:
    image: ${DOCKER_USERNAME}/${DOCKER_REPO}:latest
    container_name: memoreel-backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: ${DB_DRIVER:-com.mysql.cj.jdbc.Driver}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      NETZERO3_AUTH_TOKEN_SECRET: ${NETZERO3_AUTH_TOKEN_SECRET:-dev-only-change-me}
      NETZERO3_STORAGE_S3_BUCKET: ${NETZERO3_STORAGE_S3_BUCKET}
      NETZERO3_STORAGE_S3_REGION: ${NETZERO3_STORAGE_S3_REGION:-us-east-1}
      NETZERO3_STORAGE_S3_ENABLED: ${NETZERO3_STORAGE_S3_ENABLED:-true}
      NETZERO3_STORAGE_S3_PUBLIC_BASE_URL: ${NETZERO3_STORAGE_S3_PUBLIC_BASE_URL:-}
      NETZERO3_DYNAMODB_ENABLED: ${NETZERO3_DYNAMODB_ENABLED:-false}
      NETZERO3_DYNAMODB_TABLE_NAME: ${NETZERO3_DYNAMODB_TABLE_NAME:-campus_sustainability_reports}
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    restart: unless-stopped
