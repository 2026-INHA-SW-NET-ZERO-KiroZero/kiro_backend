services:
  app:
    image: ${DOCKER_USERNAME}/${DOCKER_REPO}:latest
    container_name: memoreel-backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: ${DB_DRIVER:-com.mysql.cj.jdbc.Driver}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      NETZERO3_AUTH_TOKEN_SECRET: ${NETZERO3_AUTH_TOKEN_SECRET:-dev-only-change-me}
      NETZERO3_STORAGE_S3_BUCKET: ${NETZERO3_STORAGE_S3_BUCKET}
      NETZERO3_STORAGE_S3_REGION: ${NETZERO3_STORAGE_S3_REGION:-us-east-1}
      NETZERO3_STORAGE_S3_ENABLED: ${NETZERO3_STORAGE_S3_ENABLED:-true}
      NETZERO3_STORAGE_S3_PUBLIC_BASE_URL: ${NETZERO3_STORAGE_S3_PUBLIC_BASE_URL:-}
      NETZERO3_DYNAMODB_ENABLED: ${NETZERO3_DYNAMODB_ENABLED:-false}
      NETZERO3_DYNAMODB_TABLE_NAME: ${NETZERO3_DYNAMODB_TABLE_NAME:-campus_sustainability_reports}
      NETZERO3_REPORT_LAMBDA_ENABLED: ${NETZERO3_REPORT_LAMBDA_ENABLED:-false}
      NETZERO3_REPORT_LAMBDA_FUNCTION_NAME: ${NETZERO3_REPORT_LAMBDA_FUNCTION_NAME:-}
      NETZERO3_REPORT_LAMBDA_REGION: ${NETZERO3_REPORT_LAMBDA_REGION:-us-east-1}
      NETZERO3_LLM_PROVIDER: ${NETZERO3_LLM_PROVIDER:-stub}
      NETZERO3_LLM_FALLBACK_ENABLED: ${NETZERO3_LLM_FALLBACK_ENABLED:-true}
      NETZERO3_CLAUDE_API_KEY: ${NETZERO3_CLAUDE_API_KEY:-}
      NETZERO3_CLAUDE_BASE_URL: ${NETZERO3_CLAUDE_BASE_URL:-https://api.anthropic.com}
      NETZERO3_CLAUDE_VERSION: ${NETZERO3_CLAUDE_VERSION:-2023-06-01}
      NETZERO3_CLAUDE_MODEL: ${NETZERO3_CLAUDE_MODEL:-claude-haiku-4-5}
      NETZERO3_CLAUDE_MAX_TOKENS: ${NETZERO3_CLAUDE_MAX_TOKENS:-2000}
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    restart: unless-stopped
