spring:
  datasource:
    url: jdbc:h2:mem:netzero3_test;MODE=MySQL;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  sql:
    init:
      mode: never

netzero3:
  storage:
    s3:
      enabled: false
      public-base-url: http://localhost:8080/mock-s3

  aws:
    dynamodb:
      enabled: false
