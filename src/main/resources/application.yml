spring:
  application:
    name: kiro_backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jackson:
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 20MB

netzero3:
  auth:
    token-secret: ${NETZERO3_AUTH_TOKEN_SECRET:dev-only-change-me}

  storage:
    s3:
      enabled: ${NETZERO3_STORAGE_S3_ENABLED:false}
      bucket: ${NETZERO3_STORAGE_S3_BUCKET:}
      region: ${NETZERO3_STORAGE_S3_REGION:us-east-1}
      public-base-url: ${NETZERO3_STORAGE_S3_PUBLIC_BASE_URL:}

  aws:
    dynamodb:
      enabled: ${NETZERO3_DYNAMODB_ENABLED:false}
      table-name: ${NETZERO3_DYNAMODB_TABLE_NAME:campus_sustainability_reports}

  llm:
    provider: stub
    claude:
      model: claude-sonnet-4-6
      max-tokens: 2048
      timeout-seconds: 30
      max-retries: 2

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  default-produces-media-type: application/json
