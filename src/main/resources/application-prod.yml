spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/netzero3?serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

netzero3:
  storage:
    s3:
      enabled: ${NETZERO3_STORAGE_S3_ENABLED:true}
      bucket: ${NETZERO3_STORAGE_S3_BUCKET}
      region: ${NETZERO3_STORAGE_S3_REGION:us-east-1}
      public-base-url: ${NETZERO3_STORAGE_S3_PUBLIC_BASE_URL:}

  aws:
    dynamodb:
      enabled: ${NETZERO3_DYNAMODB_ENABLED:false}
      table-name: ${NETZERO3_DYNAMODB_TABLE_NAME:campus_sustainability_reports}
